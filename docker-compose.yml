services:
  github-runner:
    image: ghcr.io/nomercy-entertainment/nomercy-github-runner:latest
    deploy:
      replicas: ${RUNNER_REPLICAS:-1}
      resources:
        limits:
          cpus: "${RUNNER_CPU_LIMIT:-0}"
          memory: "${RUNNER_MEM_LIMIT:-0}"
    restart: unless-stopped
    privileged: true
    environment:
      GH_TOKEN: ${GH_TOKEN}
      GITHUB_ORG: ${GITHUB_ORG:-NoMercy-Entertainment}
      RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted,Linux,X64}
      RUNNER_GROUP: ${RUNNER_GROUP:-}
    volumes:
      # Shared buildx cache across all runner replicas.
      # Named volume — works on Windows and Linux, Docker manages storage.
      # All runners read/write the same cache — one builds, all benefit.
      - buildx-cache:/var/lib/buildkit
    tmpfs:
      - /tmp

volumes:
  buildx-cache:
